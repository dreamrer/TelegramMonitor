name: Telegram Release Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Telegram Channel
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🎉 Telegram Monitor Bot 新版本发布

            🏷 版本: ${{ github.event.release.tag_name }}

            ✨ 本次更新:
            已发布新版本，欢迎升级体验

            🔍 查看详情:
            ${{ github.event.release.html_url }}

            🐳 拉取镜像:
            docker pull luoyanglangge/telegram-monitor:${{ github.event.release.tag_name }}

            📘 项目主页:
            https://github.com/luoyanglang/TelegramMonitor

      - name: Send to Telegram Group
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_GROUP_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🎉 Telegram Monitor Bot 新版本发布

            🏷 版本: ${{ github.event.release.tag_name }}

            ✨ 本次更新:
            已发布新版本，欢迎升级体验

            🔍 查看详情:
            ${{ github.event.release.html_url }}

            🐳 拉取镜像:
            docker pull luoyanglangge/telegram-monitor:${{ github.event.release.tag_name }}

            📘 项目主页:
            https://github.com/luoyanglang/TelegramMonitor
