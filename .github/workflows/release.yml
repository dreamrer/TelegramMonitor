name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (for example: v2.0.0)"
        required: true
        default: "v2.0.0"

env:
  PYTHON_VERSION: "3.11"

jobs:
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          no-cache: true

  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile \
            --name telegram-monitor-linux-x64 \
            --add-data "bot:bot" \
            --add-data "core:core" \
            --add-data "services:services" \
            --hidden-import=telegram \
            --hidden-import=telethon \
            --hidden-import=sqlalchemy \
            --hidden-import=aiosqlite \
            --hidden-import=httpx \
            --hidden-import=telegram_monitor_ads \
            main.py

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/telegram-monitor-linux-x64

  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        shell: powershell
        run: |
          pyinstaller --onefile `
            --name telegram-monitor-windows-x64 `
            --add-data "bot;bot" `
            --add-data "core;core" `
            --add-data "services;services" `
            --hidden-import=telegram `
            --hidden-import=telethon `
            --hidden-import=sqlalchemy `
            --hidden-import=aiosqlite `
            --hidden-import=httpx `
            --hidden-import=telegram_monitor_ads `
            main.py

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/telegram-monitor-windows-x64.exe

  release:
    name: Create Release
    needs:
      - docker
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: ./artifacts/linux

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: ./artifacts/windows

      - name: Prepare release files
        shell: bash
        run: |
          chmod +x ./artifacts/linux/telegram-monitor-linux-x64

          mkdir -p release/telegram-monitor
          cp .env.example release/telegram-monitor/.env.example
          cp README.md release/telegram-monitor/
          cp LICENSE release/telegram-monitor/

          cp ./artifacts/linux/telegram-monitor-linux-x64 release/telegram-monitor/
          (
            cd release
            tar -czvf telegram-monitor-linux-x64.tar.gz telegram-monitor
          )
          rm release/telegram-monitor/telegram-monitor-linux-x64

          cp ./artifacts/windows/telegram-monitor-windows-x64.exe release/telegram-monitor/
          (
            cd release
            zip -r telegram-monitor-windows-x64.zip telegram-monitor
          )

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release
          sha256sum telegram-monitor-linux-x64.tar.gz > SHA256SUMS.txt
          sha256sum telegram-monitor-windows-x64.zip >> SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Telegram Monitor ${{ steps.version.outputs.VERSION }}
          body: |
            ## Telegram Monitor ${{ steps.version.outputs.VERSION }}

            ### Downloads

            | Type | Details |
            |------|---------|
            | Docker | `docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}` |
            | Linux binary | Download `telegram-monitor-linux-x64.tar.gz` |
            | Windows binary | Download `telegram-monitor-windows-x64.zip` |
            | Source code | Download the GitHub source archive |

            ### Quick Start

            ```bash
            wget https://raw.githubusercontent.com/${{ github.repository }}/main/.env.example -O .env
            nano .env
            docker run -d --name telegram-monitor --env-file .env ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ```

            ### Update Notes

            - Review the full release page for version details and release assets.

            ---
            [Project Channel](https://t.me/langgefabu) | [Community Group](https://t.me/langgepython)
          files: |
            release/telegram-monitor-linux-x64.tar.gz
            release/telegram-monitor-windows-x64.zip
            release/SHA256SUMS.txt
          draft: false
          prerelease: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Sync Telegram channel announcement
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}
          REPO: ${{ github.repository }}
          RELEASE_ID: ${{ steps.create_release.outputs.id }}
          TAG_NAME: ${{ steps.version.outputs.VERSION }}
        run: python .github/scripts/sync_release_telegram.py
